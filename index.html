<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Strategic Fund Allocator</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  padding: 20px;
}

.card {
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
</style>
</head>

<body>

<h2>Portfolio</h2>

<button onclick="fetchPrices()">↻ Refresh Prices</button>

<div id="status"></div>

<div id="portfolio"></div>

<script>

// ---------- CONFIG ----------
const API = "/api/prices";

// ---------- STATE ----------
let buckets = {
  core: {
    amount: 6000,
    holdings: [
      { ticker: "VTI", weight: 40 },
      { ticker: "VXUS", weight: 30 },
      { ticker: "BND", weight: 30 }
    ]
  },
  satellite: {
    amount: 2000,
    holdings: [
      { ticker: "QQQ", weight: 35 },
      { ticker: "SOXX", weight: 35 },
      { ticker: "XLV", weight: 30 }
    ]
  },
  growth: {
    amount: 1500,
    holdings: [
      { ticker: "NVDA", weight: 30 },
      { ticker: "PLTR", weight: 25 },
      { ticker: "RKLB", weight: 25 },
      { ticker: "IONQ", weight: 20 }
    ]
  },
  cash: {
    amount: 500,
    holdings: [
      { ticker: "SGOV", weight: 100 }
    ]
  }
};

let prices = {};

// ---------- FETCH ----------
async function fetchPrices() {
  const tickers = Object.values(buckets)
    .flatMap(b => b.holdings.map(h => h.ticker));

  document.getElementById("status").innerText = "Loading...";

  const res = await fetch(API + "?symbols=" + tickers.join(","));
  const data = await res.json();

  prices = data.prices || {};

  document.getElementById("status").innerText =
    `Loaded ${Object.keys(prices).length}/${tickers.length}`;

  render();
}

// ---------- RENDER ----------
function render() {

  const container = document.getElementById("portfolio");
  container.innerHTML = "";

  Object.entries(buckets).forEach(([name, bucket]) => {

    let html = `<div class="card"><h3>${name.toUpperCase()}</h3>`;

    bucket.holdings.forEach(h => {

      const p = prices[h.ticker];
      const alloc = bucket.amount * (h.weight / 100);

      let price = p ? p.price : null;
      let change = p ? p.change : 0;

      let shares = price ? alloc / price : 0;

      // ✅ P&L calculation
      let pnl = 0;
      let pnlPct = 0;

      if (price && p.prev) {
        pnl = shares * (price - p.prev);
        pnlPct = ((price - p.prev) / p.prev) * 100;
      }

      html += `
        <div class="row">
          <div>${h.ticker}</div>
          <div>
            ${price ? "$" + price.toFixed(2) : "--"}
          </div>
          <div class="${change >= 0 ? 'green' : 'red'}">
            ${change ? change.toFixed(2) + "%" : "--"}
          </div>
          <div>$${alloc.toFixed(0)}</div>
          <div>${shares ? shares.toFixed(3) : "--"}</div>
          <div class="${pnl >= 0 ? 'green' : 'red'}">
            ${price ? "$" + pnl.toFixed(0) : "--"}
          </div>
          <div class="${pnlPct >= 0 ? 'green' : 'red'}">
            ${price ? pnlPct.toFixed(2) + "%" : "--"}
          </div>
        </div>
      `;
    });

    html += "</div>";
    container.innerHTML += html;
  });
}

// ---------- INIT ----------
fetchPrices();

</script>

</body>
</html>
``
